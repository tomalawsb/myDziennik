name: Build myDziennik APK 1.1

on:
  push:
    branches: ["apk-build-1-1-temp"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pobierz pliki pomocnicze
        uses: actions/checkout@v4

      - name: Ustaw JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Ustaw Android SDK
        uses: android-actions/setup-android@v3

      - name: Zainstaluj Android SDK 36
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Sprawdź paczkę poprawek
        shell: bash
        run: |
          set -euxo pipefail
          pwd
          ls -lah
          test -s myDziennik-1.1-patch.zip
          unzip -t myDziennik-1.1-patch.zip

      - name: Pobierz projekt bazowy
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth 1 https://github.com/szponciciel04/DzienniczekSzpontniczek.git app-src
          test -f app-src/gradlew
          test -f app-src/composeApp/build.gradle.kts

      - name: Nałóż poprawki
        shell: bash
        run: |
          set -euxo pipefail
          unzip -o myDziennik-1.1-patch.zip -d app-src
          test -f app-src/composeApp/src/commonMain/kotlin/io/github/szpontium/api/hebe/models/Grade.kt
          grep -n "CorrectedGrade" app-src/composeApp/src/commonMain/kotlin/io/github/szpontium/api/hebe/models/Grade.kt

      - name: Ustaw nazwę i wersję
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          from pathlib import Path
          p = Path('app-src/composeApp/build.gradle.kts')
          s = p.read_text(encoding='utf-8')
          if 'applicationId = "io.github.szpontium"' not in s:
              raise SystemExit('Nie znaleziono oryginalnego applicationId')
          s = s.replace('applicationId = "io.github.szpontium"', 'applicationId = "pl.tomalawsb.mydziennik"')
          import re
          s, n1 = re.subn(r'versionCode\s*=\s*\d+', 'versionCode = 10003', s, count=1)
          s, n2 = re.subn(r'versionName\s*=\s*"[^"]*"', 'versionName = "1.1 - 1606262113"', s, count=1)
          if n1 != 1 or n2 != 1:
              raise SystemExit(f'Nie ustawiono wersji: versionCode={n1}, versionName={n2}')
          p.write_text(s, encoding='utf-8')
          strings = Path('app-src/composeApp/src/androidMain/res/values/strings.xml')
          if strings.exists():
              t = strings.read_text(encoding='utf-8')
              t = t.replace('Dzienniczek Szpontniczek', 'myDziennik')
              strings.write_text(t, encoding='utf-8')
          PY
          printf 'sdk.dir=%s\n' "$ANDROID_HOME" > app-src/local.properties
          chmod +x app-src/gradlew
          grep -nE 'applicationId|versionCode|versionName' app-src/composeApp/build.gradle.kts

      - name: Zbuduj APK release
        working-directory: app-src
        run: ./gradlew --no-daemon :composeApp:assembleRelease --stacktrace

      - name: Przygotuj artefakt
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p artifact/lib
          APK=$(find app-src/composeApp/build/outputs/apk/release -type f -name '*.apk' | head -n 1)
          test -n "$APK"
          cp "$APK" artifact/myDziennik-v1.1-1606262113-unsigned.apk
          BT="$ANDROID_HOME/build-tools/36.0.0"
          cp "$BT/zipalign" artifact/zipalign
          cp "$BT/apksigner" artifact/apksigner
          cp "$BT/lib/apksigner.jar" artifact/lib/apksigner.jar
          chmod +x artifact/zipalign artifact/apksigner

      - name: Zapisz wynik
        uses: actions/upload-artifact@v4
        with:
          name: myDziennik-v1.1-1606262113-unsigned
          path: artifact
          if-no-files-found: error

name: Android build

on:
  push:
    branches: [ "main", "firebase-dev" ]
  pull_request:
    branches: [ "main", "firebase-dev" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Set Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.3"
      - name: Build PROD and DEV
        run: gradle --no-daemon :composeApp:assembleProdRelease :composeApp:assembleDevDebug
      - name: Prepare APK files
        shell: bash
        run: |
          set -e
          mkdir -p ci-artifact
          cp composeApp/build/outputs/apk/prod/release/composeApp-prod-release-unsigned.apk ci-artifact/myDziennik-PROD-release-unsigned.apk
          cp composeApp/build/outputs/apk/dev/debug/composeApp-dev-debug.apk ci-artifact/myDziennik-DEV-debug.apk
      - name: Upload APK files
        uses: actions/upload-artifact@v4
        with:
          name: myDziennik-dev-prod
          path: ci-artifact
          if-no-files-found: error

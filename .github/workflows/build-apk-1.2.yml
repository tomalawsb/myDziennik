name: Build myDziennik APK 1.2

on:
  push:
    branches: ["apk-build-1-2-temp"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Prepare source
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth 1 https://github.com/szponciciel04/DzienniczekSzpontniczek.git app-src
          cat .apk-patch/chunk00 .apk-patch/chunk01 .apk-patch/chunk02 .apk-patch/chunk03 .apk-patch/chunk04 | base64 --decode > patch-1.1.zip
          unzip -t patch-1.1.zip
          unzip -o patch-1.1.zip -d app-src
          unzip -t myDziennik-1.2-incremental.zip
          unzip -o myDziennik-1.2-incremental.zip -d app-src
          printf 'sdk.dir=%s\n' "$ANDROID_HOME" > app-src/local.properties
          chmod +x app-src/gradlew

      - name: Build release APK
        working-directory: app-src
        run: ./gradlew --no-daemon :composeApp:assembleRelease --stacktrace

      - name: Collect artifact
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p artifact/lib
          APK=$(find app-src/composeApp/build/outputs/apk/release -type f -name '*.apk' | head -n 1)
          test -n "$APK"
          cp "$APK" artifact/myDziennik-v1.2-1606262220-unsigned.apk
          BT="$ANDROID_HOME/build-tools/36.0.0"
          cp "$BT/zipalign" artifact/zipalign
          cp "$BT/apksigner" artifact/apksigner
          cp "$BT/lib/apksigner.jar" artifact/lib/apksigner.jar
          chmod +x artifact/zipalign artifact/apksigner

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: myDziennik-v1.2-1606262220-unsigned
          path: artifact
          if-no-files-found: error

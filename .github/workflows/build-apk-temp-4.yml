name: Build myDziennik APK chunks

on:
  push:
    branches: ["apk-build-1-1-temp"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Prepare source and patch
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth 1 https://github.com/szponciciel04/DzienniczekSzpontniczek.git app-src
          cat .apk-patch/chunk00 .apk-patch/chunk01 .apk-patch/chunk02 .apk-patch/chunk03 .apk-patch/chunk04 | base64 --decode > patch.zip
          unzip -t patch.zip
          unzip -o patch.zip -d app-src
          python3 - <<'PY'
          from pathlib import Path
          import re
          p = Path('app-src/composeApp/build.gradle.kts')
          s = p.read_text(encoding='utf-8')
          s = s.replace('applicationId = "io.github.szpontium"', 'applicationId = "pl.tomalawsb.mydziennik"')
          s, n1 = re.subn(r'versionCode\s*=\s*\d+', 'versionCode = 10003', s, count=1)
          s, n2 = re.subn(r'versionName\s*=\s*"[^"]*"', 'versionName = "1.1 - 1606262113"', s, count=1)
          if n1 != 1 or n2 != 1:
              raise SystemExit(f'Version update failed: {n1}, {n2}')
          p.write_text(s, encoding='utf-8')
          strings = Path('app-src/composeApp/src/androidMain/res/values/strings.xml')
          if strings.exists():
              t = strings.read_text(encoding='utf-8').replace('Dzienniczek Szpontniczek', 'myDziennik')
              strings.write_text(t, encoding='utf-8')
          PY
          printf 'sdk.dir=%s\n' "$ANDROID_HOME" > app-src/local.properties
          chmod +x app-src/gradlew

      - name: Build release APK
        working-directory: app-src
        run: ./gradlew --no-daemon :composeApp:assembleRelease --stacktrace

      - name: Collect artifact
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p artifact/lib
          APK=$(find app-src/composeApp/build/outputs/apk/release -type f -name '*.apk' | head -n 1)
          test -n "$APK"
          cp "$APK" artifact/myDziennik-v1.1-1606262113-unsigned.apk
          BT="$ANDROID_HOME/build-tools/36.0.0"
          cp "$BT/zipalign" artifact/zipalign
          cp "$BT/apksigner" artifact/apksigner
          cp "$BT/lib/apksigner.jar" artifact/lib/apksigner.jar
          chmod +x artifact/zipalign artifact/apksigner

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: myDziennik-v1.1-1606262113-unsigned
          path: artifact
          if-no-files-found: error
